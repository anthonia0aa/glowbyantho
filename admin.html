<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Glow Studio</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{background:#f9f3f6}.login{width:min(460px,92%);margin:9vh auto;background:white;padding:35px;border-radius:30px;border:1px solid #ecd8e1}.login input,.admin textarea{width:100%;padding:13px;border:1px solid #ead4dd;border-radius:14px;margin:8px 0;font:inherit}.admin{width:min(1220px,94%);margin:35px auto}.admin-top{display:flex;justify-content:space-between;align-items:center}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:26px 0}.stat{background:white;padding:22px;border-radius:22px;border:1px solid #eddce4}.stat b{display:block;font-size:34px;font-family:Playfair Display}.tabs-admin{display:flex;gap:8px;flex-wrap:wrap}.tabs-admin button{border:0;border-radius:999px;padding:11px 16px;background:white}.tabs-admin button.active{background:#d9799a;color:white}.panel{display:none;background:white;border-radius:24px;padding:24px;margin-top:20px;border:1px solid #ecd8e1}.panel.active{display:block}.record{padding:16px;border-bottom:1px solid #f0e1e7}.head{display:flex;justify-content:space-between;gap:12px}.status{background:#fff0b9;border-radius:999px;padding:5px 10px;font-size:11px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.actions button,.actions a{border:0;border-radius:999px;padding:9px 12px;background:#f7dce7;color:#82455c;text-decoration:none;font-size:12px}@media(max-width:760px){.stats{grid-template-columns:1fr 1fr}.admin-top{display:grid;gap:12px}}</style></head><body>
<div id="login" class="login"><p class="eyebrow">ACCESO TITULAR</p><h1 style="font-family:Playfair Display">Glow Studio</h1><p>Entra con tu usuario de Supabase.</p><input id="email" type="email" value="anthonia06.dr@gmail.com"><input id="password" type="password" placeholder="Contraseña"><button id="loginBtn" class="btn primary">Entrar</button><p id="loginError"></p></div>
<div id="dashboard" class="admin hidden"><div class="admin-top"><div><p class="eyebrow">PANEL PRIVADO</p><h1 style="font-family:Playfair Display">Hola, Antho ✨</h1></div><div><a class="btn ghost" href="index.html">Ver web</a> <button id="logout" class="btn primary">Salir</button></div></div><div class="stats"><div class="stat"><span>Tests</span><b id="sTests">0</b></div><div class="stat"><span>Reservas</span><b id="sBookings">0</b></div><div class="stat"><span>Preguntas</span><b id="sQuestions">0</b></div><div class="stat"><span>Pedidos</span><b id="sOrders">0</b></div></div><div class="tabs-admin"><button class="active" data-panel="tests">Glow Match</button><button data-panel="bookings">Reservas</button><button data-panel="questions">Preguntas</button><button data-panel="orders">Pedidos</button></div><section id="tests" class="panel active"></section><section id="bookings" class="panel"></section><section id="questions" class="panel"></section><section id="orders" class="panel"></section></div>
<script src="config.js"></script><script src="admin.js"></script></body></html>
