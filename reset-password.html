<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nueva contraseña | Glow Studio</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><main class="section"><div class="shell" style="max-width:520px"><div class="form-card"><p class="eyebrow">GLOW STUDIO</p><h2>Crear nueva contraseña</h2><p>Escribe una contraseña nueva para tu acceso privado.</p><input id="newPassword" type="password" minlength="8" placeholder="Mínimo 8 caracteres"><button id="savePassword" class="btn primary">Guardar contraseña</button><p id="message"></p></div></div></main><script src="config.js"></script><script>const db=window.supabase.createClient(window.GLOW_CONFIG.SUPABASE_URL,window.GLOW_CONFIG.SUPABASE_PUBLISHABLE_KEY);document.getElementById('savePassword').onclick=async()=>{const p=document.getElementById('newPassword').value;const m=document.getElementById('message');if(p.length<8){m.textContent='Usa al menos 8 caracteres.';return}const{error}=await db.auth.updateUser({password:p});m.textContent=error?'No se pudo actualizar: '+error.message:'Contraseña actualizada. Ya puedes entrar a Glow Studio.'}</script></body></html>
